# .github/workflows/rebuild-teamup.yml
# Rebuilds and republishes the Quarto site every hour so new sign-ups appear automatically.

name: Rebuild TeamUp page

on:
  schedule:
    - cron: '0 * * * *'   # every hour — adjust as needed
  workflow_dispatch:        # also allows manual trigger from GitHub UI

jobs:
  rebuild:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.3'

      - name: Install R packages
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            googlesheets4
            dplyr
            htmltools
            stringr
            glue

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render site
        run: quarto render
        # If you only want to render the teamup page:
        # run: quarto render teamup.qmd

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site   # default Quarto output folder
