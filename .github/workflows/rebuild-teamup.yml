# .github/workflows/rebuild-teamup.yml
# Rebuilds and republishes the Quarto site every hour so new sign-ups appear automatically.

name: Rebuild TeamUp page


on:
  push:
    branches:
      - main                # rebuild on every push to main
  schedule:
    - cron: '0 * * * *'    # also rebuild every hour for new form sign-ups
  workflow_dispatch:        # also allows manual trigger from GitHub UI  

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libuv1-dev libssl-dev  

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.3'

      - name: Install R packages
        run: |
          install.packages(c("googlesheets4", "dplyr", "htmltools", "stringr", "glue"))
        shell: Rscript {0}

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render site
        run: quarto render

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4 